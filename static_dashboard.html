<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时行情看板</title>
    <!-- 引入 Tailwind CSS 用于样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Plotly.js 用于绘图 -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <!-- 引入 Axios 用于网络请求 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-[#f5f5f7] text-[#1d1d1f] font-sans antialiased">
    <div id="app" class="min-h-screen flex flex-col md:flex-row">
        
        <!-- 侧边栏设置 -->
        <aside class="w-full md:w-80 bg-white/80 backdrop-blur-xl border-r border-gray-200 p-8 flex-shrink-0">
            <h1 class="text-2xl font-semibold mb-8 text-[#1d1d1f] tracking-tight">Market Helper</h1>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wide">API Token</label>
                    <input type="password" v-model="apiToken" placeholder="请输入 API Token" 
                        class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wide">股票代码</label>
                    <input type="text" v-model="stockCode" placeholder="例如: 600519" 
                        class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wide">市场区域</label>
                    <div class="relative">
                        <select v-model="region" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm appearance-none">
                            <option value="cn">CN - A股</option>
                            <option value="hk">HK - 港股</option>
                            <option value="us">US - 美股</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wide">K线周期</label>
                    <div class="relative">
                        <select v-model="selectedTimeframe" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm appearance-none">
                            <option v-for="(value, key) in timeframeMap" :key="key" :value="key">{{ key }}</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <button @click="fetchData" :disabled="loading"
                    class="w-full bg-[#0071e3] text-white py-2.5 px-4 rounded-full font-medium hover:bg-[#0077ed] transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm hover:shadow-md active:scale-[0.98] flex justify-center items-center mt-4">
                    <span v-if="loading" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        加载中...
                    </span>
                    <span v-else>获取行情</span>
                </button>

                <!-- AI 分析入口预留 -->
                <div class="pt-6 border-t border-gray-200 mt-6">
                    <h3 class="text-xs font-medium text-gray-500 mb-3 uppercase tracking-wide">AI 助手</h3>
                    <textarea v-model="aiPrompt" placeholder="输入问题，例如：分析这只股票的趋势..." 
                        class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm h-24 mb-3 focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 transition-all resize-none shadow-sm"></textarea>
                    <button @click="mockAiAnalysis" class="w-full bg-white text-purple-600 border border-purple-200 py-2 px-4 rounded-full text-sm font-medium hover:bg-purple-50 hover:border-purple-300 transition-all shadow-sm">
                        智能分析
                    </button>
                    <div v-if="aiResponse" class="mt-4 text-sm text-gray-600 bg-white border border-gray-100 p-4 rounded-xl shadow-sm leading-relaxed">
                        {{ aiResponse }}
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 p-8 overflow-y-auto">
            <!-- 错误提示 -->
            <div v-if="error" class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mb-8 text-sm flex items-center shadow-sm" role="alert">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p>{{ error }}</p>
            </div>

            <!-- 实时行情卡片 -->
            <div v-if="quote" class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 p-8 mb-8 transition-all hover:shadow-[0_8px_30px_rgba(0,0,0,0.04)]">
                <div class="flex items-center justify-between mb-6 border-b border-gray-100 pb-4">
                    <h2 class="text-2xl font-semibold text-[#1d1d1f] tracking-tight">{{ currentFormattedCode }}</h2>
                    <span class="px-3 py-1 bg-gray-100 text-gray-600 text-xs rounded-full font-medium">实时</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">当前价格</p>
                        <p class="text-3xl font-semibold text-[#1d1d1f] tracking-tight">{{ quote.p }}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">成交量</p>
                        <p class="text-xl font-medium text-gray-900">{{ quote.v }}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">成交额</p>
                        <p class="text-xl font-medium text-gray-900">{{ quote.vw }}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">更新时间</p>
                        <p class="text-sm font-medium text-gray-900 mt-1.5">{{ formatTime(quote.t) }}</p>
                    </div>
                </div>
            </div>

            <!-- K线图容器 -->
            <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 p-8 min-h-[600px] transition-all hover:shadow-[0_8px_30px_rgba(0,0,0,0.04)]">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-semibold text-[#1d1d1f] tracking-tight">图表分析</h2>
                    <span class="text-sm text-gray-500 font-medium">{{ selectedTimeframe }}</span>
                </div>
                <div id="kline-chart" class="w-full h-[600px]">
                    <div v-if="!klineData && !loading" class="flex flex-col items-center justify-center h-full text-gray-400">
                        <svg class="w-16 h-16 mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        <p class="text-sm font-medium">请输入股票代码并点击“获取行情”开始</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const apiToken = ref('28222a4f7c7c4ae6bfe07d8bb75cfc82-infoway'); // 默认值方便测试
                const stockCode = ref('600519');
                const region = ref('cn');
                
                const timeframeMap = {
                    "1分钟": 1,
                    "5分钟": 2,
                    "15分钟": 3,
                    "30分钟": 4,
                    "1小时": 5,
                    "日K": 8,
                    "周K": 9,
                    "月K": 10
                };
                const selectedTimeframe = ref("日K");

                const loading = ref(false);
                const error = ref('');
                const quote = ref(null);
                const klineData = ref(null);
                const currentFormattedCode = ref('');
                
                // AI 相关
                const aiPrompt = ref('');
                const aiResponse = ref('');

                // 使用 cors.sh 代理解决跨域问题 (仅用于开发/演示，生产环境建议自建后端代理)
                // 备选代理: https://corsproxy.io/?
                const PROXY_URL = "https://corsproxy.io/?";
                const BASE_URL = "https://data.infoway.io/stock";

                // 格式化股票代码 (逻辑复刻自 Python)
                const formatCode = (code, reg) => {
                    code = code.trim().toUpperCase();
                    if (reg === "cn") {
                        if (code.endsWith(".SH") || code.endsWith(".SZ") || code.endsWith(".SS")) {
                            return code.replace(".SS", ".SH");
                        }
                        if (code.startsWith("6")) return `${code}.SH`;
                        if (code.startsWith("0") || code.startsWith("3")) return `${code}.SZ`;
                        if (code.startsWith("8") || code.startsWith("4")) return `${code}.BJ`;
                        return `${code}.SH`;
                    } else if (reg === "hk") {
                        return code.endsWith(".HK") ? code : `${code}.HK`;
                    } else if (reg === "us") {
                        return code.endsWith(".US") ? code : `${code}.US`;
                    }
                    return code;
                };

                // 时间格式化
                const formatTime = (ts) => {
                    if (!ts) return 'N/A';
                    // API 返回的是毫秒时间戳 (UTC)，这里简单转为本地时间字符串
                    // 如果需要严格的 CST 时间，可以手动计算偏移
                    return new Date(ts).toLocaleString('zh-CN', { hour12: false });
                };

                // 计算移动平均线
                const calculateMA = (closes, window) => {
                    let ma = [];
                    for (let i = 0; i < closes.length; i++) {
                        if (i < window - 1) {
                            ma.push(null);
                            continue;
                        }
                        let sum = 0;
                        for (let j = 0; j < window; j++) {
                            sum += closes[i - j];
                        }
                        ma.push(sum / window);
                    }
                    return ma;
                };

                // 带重试机制的请求函数
                const fetchWithRetry = async (url, headers, maxRetries = 10) => {
                    for (let i = 0; i < maxRetries; i++) {
                        try {
                            const res = await axios.get(url, { headers });
                            // 只有当 HTTP 200 且 API 返回 ret=200 时才算成功
                            if (res.data && res.data.ret === 200) {
                                return res;
                            }
                            // 如果 API 返回错误码，视为失败并重试
                            throw new Error(res.data?.msg || "API Error");
                        } catch (err) {
                            console.warn(`Attempt ${i + 1} failed: ${err.message}`);
                            if (i === maxRetries - 1) throw err; // 最后一次尝试失败，抛出异常
                            // 等待 50ms 后重试
                            await new Promise(resolve => setTimeout(resolve, 50));
                        }
                    }
                };

                const fetchData = async () => {
                    if (!apiToken.value) {
                        error.value = "请输入 API Token";
                        return;
                    }
                    
                    loading.value = true;
                    error.value = '';
                    quote.value = null;
                    
                    const formattedCode = formatCode(stockCode.value, region.value);
                    currentFormattedCode.value = formattedCode;

                    try {
                        const headers = { "apikey": apiToken.value };
                        
                        // 1. 获取实时报价
                        // 拼接代理地址
                        const quoteUrl = `${PROXY_URL}${encodeURIComponent(`${BASE_URL}/batch_trade/${formattedCode}`)}`;
                        // 使用重试机制
                        const quoteRes = await fetchWithRetry(quoteUrl, headers);
                        
                        if (quoteRes.data && quoteRes.data.ret === 200 && quoteRes.data.data.length > 0) {
                            quote.value = quoteRes.data.data[0];
                        } else {
                            throw new Error(quoteRes.data.msg || "获取行情失败");
                        }

                        // 2. 获取 K 线数据
                        const kType = timeframeMap[selectedTimeframe.value];
                        const klineUrl = `${PROXY_URL}${encodeURIComponent(`${BASE_URL}/batch_kline/${kType}/500/${formattedCode}`)}`;
                        // 使用重试机制
                        const klineRes = await fetchWithRetry(klineUrl, headers);
                        
                        if (klineRes.data && klineRes.data.ret === 200 && klineRes.data.data.length > 0) {
                            const candles = klineRes.data.data[0].respList;
                            renderChart(candles);
                            klineData.value = candles;
                        } else {
                            // 清空图表
                            Plotly.purge('kline-chart');
                            error.value = "未获取到 K 线数据";
                        }

                    } catch (err) {
                        console.error(err);
                        // 十轮 request 全部都 fail 则输出 Request failed 提示
                        error.value = "Request failed";
                    } finally {
                        loading.value = false;
                    }
                };

                const renderChart = (candles) => {
                    if (!candles || candles.length === 0) return;

                    // 准备 Plotly 数据
                    const times = candles.map(c => new Date(c.t * 1000)); // 秒转毫秒
                    // 确保数值类型，防止字符串拼接导致计算错误
                    const opens = candles.map(c => parseFloat(c.o));
                    const highs = candles.map(c => parseFloat(c.h));
                    const lows = candles.map(c => parseFloat(c.l));
                    const closes = candles.map(c => parseFloat(c.c));
                    const volumes = candles.map(c => parseFloat(c.v));

                    // 计算均线
                    const ma5 = calculateMA(closes, 5);
                    const ma10 = calculateMA(closes, 10);
                    const ma20 = calculateMA(closes, 20);

                    // 成交量颜色
                    const volColors = opens.map((o, i) => closes[i] >= o ? '#ef4444' : '#22c55e');

                    // Trace 1: Candlestick
                    const traceCandle = {
                        x: times,
                        close: closes,
                        decreasing: {line: {color: '#22c55e'}}, // 跌：绿色
                        increasing: {line: {color: '#ef4444'}}, // 涨：红色
                        high: highs,
                        low: lows,
                        open: opens,
                        type: 'candlestick',
                        xaxis: 'x',
                        yaxis: 'y',
                        name: 'K线'
                    };

                    // Trace 2-4: MA Lines
                    const traceMA5 = { x: times, y: ma5, type: 'scatter', mode: 'lines', line: { color: 'orange', width: 1 }, name: 'MA5', yaxis: 'y' };
                    const traceMA10 = { x: times, y: ma10, type: 'scatter', mode: 'lines', line: { color: 'blue', width: 1 }, name: 'MA10', yaxis: 'y' };
                    const traceMA20 = { x: times, y: ma20, type: 'scatter', mode: 'lines', line: { color: 'purple', width: 1 }, name: 'MA20', yaxis: 'y' };

                    // Trace 5: Volume
                    const traceVol = {
                        x: times,
                        y: volumes,
                        type: 'bar',
                        marker: { color: volColors },
                        xaxis: 'x',
                        yaxis: 'y2',
                        name: '成交量'
                    };

                    const layout = {
                        dragmode: 'zoom',
                        showlegend: true,
                        legend: {
                            orientation: 'h',
                            yanchor: 'bottom',
                            y: 1.02,
                            xanchor: 'right',
                            x: 1
                        },
                        grid: {
                            rows: 2,
                            columns: 1,
                            pattern: 'independent',
                            roworder: 'top to bottom'
                        },
                        xaxis: {
                            rangeslider: { visible: false },
                            type: 'date',
                            anchor: 'y'
                        },
                        yaxis: {
                            domain: [0.3, 1],
                            autorange: true,
                            type: 'linear'
                        },
                        yaxis2: {
                            domain: [0, 0.2],
                            autorange: true,
                            type: 'linear'
                        },
                        margin: {
                            l: 50, r: 50, b: 40, t: 30
                        },
                        height: 600,
                        modebar: {
                            orientation: 'v'
                        }
                    };
                    
                    // 针对 A 股简单的非交易时间段隐藏 (Rangebreaks)
                    if (region.value === 'cn') {
                        const rangebreaks = [];
                        const tf = selectedTimeframe.value;
                        
                        // 周末
                        rangebreaks.push({ bounds: ["sat", "mon"] });

                        // 分时图隐藏午休和过夜
                        if (tf.includes("分钟") || tf.includes("小时")) {
                            rangebreaks.push({ bounds: [11.5, 13], pattern: "hour" }); // 午休
                            rangebreaks.push({ bounds: [15, 9.5], pattern: "hour" });  // 过夜
                        }
                        
                        layout.xaxis.rangebreaks = rangebreaks;
                    }

                    const config = {
                        responsive: true,
                        displayModeBar: true,
                        displaylogo: false,
                        modeBarButtonsToRemove: ['select2d', 'lasso2d', 'autoScale2d', 'hoverClosestCartesian', 'hoverCompareCartesian']
                    };

                    Plotly.newPlot('kline-chart', [traceCandle, traceMA5, traceMA10, traceMA20, traceVol], layout, config);
                };

                // 模拟 AI 分析功能
                const mockAiAnalysis = async () => {
                    if (!aiPrompt.value) return;
                    aiResponse.value = "正在思考...";
                    
                    // 这里是接入真实 AI 接口的地方
                    // 例如：调用 OpenAI API
                    /*
                    const aiRes = await axios.post('https://api.openai.com/v1/chat/completions', {
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: aiPrompt.value}]
                    }, { headers: { Authorization: `Bearer ${YOUR_OPENAI_KEY}` } });
                    */

                    // 模拟延迟回复
                    setTimeout(() => {
                        aiResponse.value = `[模拟回复] 我收到了你的问题：“${aiPrompt.value}”。\n\n基于当前行情 (${currentFormattedCode.value})，价格为 ${quote.value?.p || '未知'}。这是一个静态页面演示，请在代码中配置真实的 AI API Key 来获取智能分析。`;
                    }, 1000);
                };

                return {
                    apiToken, stockCode, region, loading, error, quote, klineData,
                    fetchData, aiPrompt, aiResponse, mockAiAnalysis, formatTime, currentFormattedCode,
                    timeframeMap, selectedTimeframe
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
